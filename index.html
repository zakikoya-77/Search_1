<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zaki - Search · Weather · Flights · FIFA</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #ffffff;
    --bg-secondary: #f5f5f4;
    --bg-tertiary: #efede8;
    --text: #1a1a1a;
    --text-secondary: #6b6b6b;
    --text-tertiary: #9a9a9a;
    --text-info: #185fa5;
    --text-success: #3b6d11;
    --text-danger: #a32d2d;
    --border: rgba(0,0,0,0.10);
    --border-secondary: rgba(0,0,0,0.18);
    --radius-md: 8px;
    --radius-lg: 12px;
    --chip-green-bg: #EAF3DE; --chip-green-text: #27500A;
    --chip-amber-bg: #FAEEDA; --chip-amber-text: #633806;
    --chip-red-bg:   #FCEBEB; --chip-red-text:   #791F1F;
    --chip-blue-bg:  #E6F1FB; --chip-blue-text:  #0C447C;
    --chip-purple-bg:#EEEDFE; --chip-purple-text:#3C3489;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1c1c1c;
      --bg-secondary: #252525;
      --bg-tertiary: #2e2e2e;
      --text: #f0f0f0;
      --text-secondary: #aaaaaa;
      --text-tertiary: #666666;
      --text-info: #85b7eb;
      --text-success: #97c459;
      --text-danger: #f09595;
      --border: rgba(255,255,255,0.08);
      --border-secondary: rgba(255,255,255,0.16);
      --chip-green-bg: #27500A; --chip-green-text: #C0DD97;
      --chip-amber-bg: #633806; --chip-amber-text: #FAC775;
      --chip-red-bg:   #791F1F; --chip-red-text:   #F7C1C1;
      --chip-blue-bg:  #0C447C; --chip-blue-text:  #B5D4F4;
      --chip-purple-bg:#3C3489; --chip-purple-text:#CECBF6;
    }
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg-tertiary);
    color: var(--text);
    min-height: 100vh;
    padding: 0 0 3rem;
  }

  header {
    background: var(--bg);
    border-bottom: 0.5px solid var(--border);
    padding: 1rem 1.5rem;
    display: flex;
    align-items: center;
    gap: 10px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  header .logo-icon {
    width: 34px; height: 34px;
    background: var(--bg-secondary);
    border: 0.5px solid var(--border);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; color: var(--text-secondary);
  }
  header h1 { font-size: 16px; font-weight: 500; color: var(--text); }
  header span { font-size: 13px; color: var(--text-tertiary); }

  /* ── Two-column page layout ── */
  .page {
    max-width: 1200px;
    margin: 0 auto;
    padding: 1.5rem 1rem;
    display: grid;
    grid-template-columns: 1fr 360px;
    gap: 1.25rem;
    align-items: start;
  }

  .col-left { display: flex; flex-direction: column; gap: 1.25rem; }
  .col-right { display: flex; flex-direction: column; gap: 1.25rem; }

  @media (max-width: 820px) {
    .page { grid-template-columns: 1fr; }
  }

  /* ── Card ── */
  .card {
    background: var(--bg);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 1.25rem 1.5rem;
  }

  .section-label {
    font-size: 11px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: .07em;
    color: var(--text-tertiary);
    display: flex;
    align-items: center;
    gap: 5px;
    margin-bottom: .8rem;
  }

  /* ── Search ── */
  .search-row { display: flex; gap: 8px; }
  .search-row input {
    flex: 1;
    height: 40px;
    padding: 0 14px;
    font-size: 15px;
    background: var(--bg);
    border: 0.5px solid var(--border-secondary);
    border-radius: var(--radius-md);
    color: var(--text);
    outline: none;
    transition: border-color .15s, box-shadow .15s;
  }
  .search-row input::placeholder { color: var(--text-tertiary); }
  .search-row input:focus {
    border-color: #378ADD;
    box-shadow: 0 0 0 3px rgba(55,138,221,.15);
  }

  .btn {
    height: 40px; padding: 0 18px;
    font-size: 14px; font-weight: 500;
    background: var(--bg);
    border: 0.5px solid var(--border-secondary);
    border-radius: var(--radius-md);
    color: var(--text); cursor: pointer;
    display: inline-flex; align-items: center; gap: 6px;
    transition: background .12s, transform .1s;
    white-space: nowrap;
  }
  .btn:hover { background: var(--bg-secondary); }
  .btn:active { transform: scale(.98); }

  .result-item { padding: .85rem 0; border-bottom: 0.5px solid var(--border); }
  .result-item:last-child { border-bottom: none; }
  .result-title {
    font-size: 14px; font-weight: 500; color: var(--text-info);
    text-decoration: none; display: block; margin-bottom: 2px; line-height: 1.4;
  }
  .result-title:hover { text-decoration: underline; }
  .result-url { font-size: 11px; color: var(--text-success); margin-bottom: 3px; word-break: break-all; }
  .result-desc { font-size: 13px; color: var(--text-secondary); line-height: 1.55; }

  /* ── Weather ── */
  .wx-header { display: flex; align-items: flex-start; gap: 12px; margin-bottom: .75rem; }
  .wx-icon { font-size: 36px; color: var(--text-secondary); flex-shrink: 0; }
  .wx-temp { font-size: 28px; font-weight: 500; color: var(--text); line-height: 1; }
  .wx-desc { font-size: 13px; color: var(--text-secondary); margin-top: 3px; }
  .wx-loc { font-size: 12px; color: var(--text-tertiary); margin-bottom: .85rem; display: flex; align-items: center; gap: 4px; }
  .wx-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; }
  .wx-stat { background: var(--bg-secondary); border-radius: var(--radius-md); padding: .7rem .9rem; }
  .wx-key { font-size: 11px; color: var(--text-tertiary); }
  .wx-val { font-size: 18px; font-weight: 500; color: var(--text); margin-top: 2px; }

  /* ── Flights ── */
  .flight-row { display: flex; align-items: center; gap: 12px; padding: .8rem 0; border-bottom: 0.5px solid var(--border); }
  .flight-row:last-child { border-bottom: none; }
  .flight-icon { font-size: 16px; color: var(--text-tertiary); flex-shrink: 0; }
  .flight-info { flex: 1; min-width: 0; }
  .flight-route { font-size: 14px; font-weight: 500; color: var(--text); }
  .flight-route .airline { font-weight: 400; font-size: 13px; color: var(--text-secondary); }
  .flight-times { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }
  .flight-right { display: flex; flex-direction: column; align-items: flex-end; gap: 5px; flex-shrink: 0; }
  .flight-price { font-size: 15px; font-weight: 500; color: var(--text); }

  /* ── FIFA ── */
  .fifa-match {
    padding: .85rem 0;
    border-bottom: 0.5px solid var(--border);
  }
  .fifa-match:last-child { border-bottom: none; }

  .fifa-date-group { margin-bottom: .15rem; }
  .fifa-date-label {
    font-size: 10px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: .06em;
    color: var(--text-tertiary);
    padding: .5rem 0 .3rem;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .fifa-date-label::after {
    content: '';
    flex: 1;
    height: 0.5px;
    background: var(--border);
  }

  .fifa-teams {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 5px;
  }
  .fifa-team {
    flex: 1;
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .fifa-team.away { flex-direction: row-reverse; text-align: right; }

  .fifa-flag {
    font-size: 20px;
    line-height: 1;
    flex-shrink: 0;
  }

  .fifa-vs {
    font-size: 11px;
    color: var(--text-tertiary);
    font-weight: 500;
    flex-shrink: 0;
    background: var(--bg-secondary);
    border-radius: 4px;
    padding: 2px 6px;
  }

  .fifa-meta {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }
  .fifa-kickoff {
    font-size: 12px;
    color: var(--text-secondary);
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .fifa-venue {
    font-size: 11px;
    color: var(--text-tertiary);
    display: flex;
    align-items: center;
    gap: 3px;
  }
  .fifa-prob {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .prob-bar {
    height: 4px;
    border-radius: 2px;
    background: var(--bg-secondary);
    width: 60px;
    overflow: hidden;
    display: flex;
  }
  .prob-home { background: #185fa5; height: 100%; }
  .prob-draw { background: #9a9a9a; height: 100%; }
  .prob-away { background: #a32d2d; height: 100%; }
  .prob-label { font-size: 10px; color: var(--text-tertiary); white-space: nowrap; }

  /* Map placeholder */
  .venue-map {
    margin-top: .5rem;
    border-radius: var(--radius-md);
    overflow: hidden;
    height: 130px;
    background: var(--bg-secondary);
    border: 0.5px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }
  .venue-map iframe {
    width: 100%; height: 100%;
    border: none;
    display: block;
  }
  .venue-map-label {
    position: absolute;
    bottom: 6px; left: 8px;
    font-size: 10px;
    color: var(--text-tertiary);
    background: var(--bg);
    padding: 2px 6px;
    border-radius: 4px;
    border: 0.5px solid var(--border);
  }

  /* ── Chips ── */
  .chip {
    display: inline-flex; align-items: center; gap: 4px;
    font-size: 11px; font-weight: 500; padding: 3px 8px; border-radius: 100px;
  }
  .chip-green  { background: var(--chip-green-bg);  color: var(--chip-green-text); }
  .chip-amber  { background: var(--chip-amber-bg);  color: var(--chip-amber-text); }
  .chip-red    { background: var(--chip-red-bg);    color: var(--chip-red-text); }
  .chip-blue   { background: var(--chip-blue-bg);   color: var(--chip-blue-text); }
  .chip-purple { background: var(--chip-purple-bg); color: var(--chip-purple-text); }

  /* ── Skeleton ── */
  .skeleton { background: var(--bg-secondary); border-radius: var(--radius-md); animation: sk 1.4s ease-in-out infinite; }
  @keyframes sk { 0%,100%{opacity:.45} 50%{opacity:1} }

  .err-msg { font-size: 13px; color: var(--text-danger); display: flex; align-items: flex-start; gap: 6px; padding: .5rem 0; line-height: 1.5; }
  .info-note { font-size: 12px; color: var(--text-tertiary); margin-bottom: .85rem; display: flex; align-items: center; gap: 5px; }

  @media (max-width: 520px) {
    .wx-grid { grid-template-columns: repeat(2,1fr); }
    .flight-times { display: none; }
  }
</style>
</head>
<body>

<header>
  <div class="logo-icon"><i class="ti ti-layout-dashboard" aria-hidden="true"></i></div>
  <div>
    <h1>Hub</h1>
    <span>Search · Weather · Flights · FIFA 2026</span>
  </div>
</header>

<div class="page">

  <!-- ══ LEFT COLUMN ══ -->
  <div class="col-left">

    <!-- SEARCH -->
    <div class="card">
      <div class="section-label">
        <i class="ti ti-search" aria-hidden="true"></i> Web search
      </div>
      <div class="search-row">
        <input type="text" id="q" placeholder="Type anything and press Enter…" autocomplete="off" aria-label="Search query">
        <button class="btn" onclick="doSearch()">
          <i class="ti ti-search" aria-hidden="true"></i> Search
        </button>
      </div>
      <div id="search-out" style="margin-top:.25rem"></div>
    </div>

    <!-- WEATHER -->
    <div class="card">
      <div class="section-label">
        <i class="ti ti-cloud" aria-hidden="true"></i> Current weather
      </div>
      <div id="wx-out">
        <div class="skeleton" style="height:100px"></div>
      </div>
    </div>

    <!-- FLIGHTS -->
    <div class="card">
      <div class="section-label">
        <i class="ti ti-plane" aria-hidden="true"></i> Budget European flights — under 1,000 local currency
      </div>
      <div id="fl-out">
        <div class="skeleton" style="height:200px"></div>
      </div>
    </div>

  </div>

  <!-- ══ RIGHT COLUMN ══ -->
  <div class="col-right">

    <!-- FIFA MATCHES -->
    <div class="card">
      <div class="section-label">
        <i class="ti ti-trophy" aria-hidden="true"></i> FIFA World Cup 2026 — upcoming fixtures
      </div>
      <div id="fifa-out">
        <div class="skeleton" style="height:240px"></div>
      </div>
    </div>

  </div>

</div><!-- /page -->

<script>
const PROXY = url => `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`;

// ── SEARCH ────────────────────────────────────────────────────────────────────
async function doSearch() {
  const q = document.getElementById('q').value.trim();
  if (!q) return;
  const out = document.getElementById('search-out');
  out.innerHTML = [1,2,3].map(()=>`<div class="skeleton" style="height:18px;margin:10px 0"></div>`).join('');
  try {
    const r = await fetch(PROXY(`https://html.duckduckgo.com/html/?q=${encodeURIComponent(q)}`));
    const d = await r.json();
    const doc = new DOMParser().parseFromString(d.contents, 'text/html');
    const items = Array.from(doc.querySelectorAll('.result__body')).slice(0, 8);
    if (!items.length) { out.innerHTML = `<p style="color:var(--text-tertiary);font-size:13px;padding:.5rem 0">No results found.</p>`; return; }
    out.innerHTML = `<div style="margin-top:.5rem">` + items.map(el => {
      const a    = el.querySelector('.result__a');
      const snip = el.querySelector('.result__snippet');
      const urlEl= el.querySelector('.result__url');
      if (!a) return '';
      let rawHref = a.getAttribute('href') || '';
      let href = rawHref;
      try {
        if (rawHref.includes('/l/?') || rawHref.includes('duckduckgo.com/l/')) {
          const params = new URL('https://duckduckgo.com' + rawHref).searchParams;
          const uddg = params.get('uddg') || params.get('u3') || params.get('kh') || '';
          if (uddg) href = decodeURIComponent(uddg);
        } else if (rawHref.startsWith('//')) {
          href = 'https:' + rawHref;
        }
      } catch(e) { href = rawHref; }
      const title = a.textContent.trim();
      const desc  = snip  ? snip.textContent.trim() : '';
      const src   = urlEl ? urlEl.textContent.trim() : '';
      return `<div class="result-item">
        <a class="result-title" href="${href}" target="_blank" rel="noopener">${title}</a>
        ${src  ? `<div class="result-url">${src}</div>` : ''}
        ${desc ? `<div class="result-desc">${desc}</div>` : ''}
      </div>`;
    }).join('') + `</div>`;
  } catch(e) {
    out.innerHTML = `<div class="err-msg"><i class="ti ti-alert-circle"></i>
      Proxy unavailable. <a href="https://duckduckgo.com/?q=${encodeURIComponent(q)}" target="_blank" rel="noopener" style="color:var(--text-info)">Open DuckDuckGo ↗</a>
    </div>`;
  }
}
document.getElementById('q').addEventListener('keydown', e => { if (e.key === 'Enter') doSearch(); });

// ── WEATHER ───────────────────────────────────────────────────────────────────
const WX_ICONS = {0:'ti-sun',1:'ti-sun',2:'ti-cloud-sun',3:'ti-cloud',45:'ti-mist',48:'ti-mist',51:'ti-cloud-drizzle',61:'ti-cloud-rain',71:'ti-snowflake',80:'ti-cloud-rain',95:'ti-storm',99:'ti-storm'};
const WX_DESC  = {0:'Clear sky',1:'Mainly clear',2:'Partly cloudy',3:'Overcast',45:'Fog',48:'Icy fog',51:'Light drizzle',61:'Rain',71:'Snow',80:'Showers',95:'Thunderstorm',99:'Heavy thunderstorm'};

function renderWeather(city, country, lat, lon, note) {
  const wxUrl = `https://api.open-meteo.com/v1/forecast?latitude=${(+lat).toFixed(4)}&longitude=${(+lon).toFixed(4)}&current=temperature_2m,relative_humidity_2m,wind_speed_10m,weather_code,apparent_temperature&wind_speed_unit=kmh&timezone=auto`;
  fetch(wxUrl).then(r => r.json()).then(d => {
    const c = d.current;
    const code = c.weather_code;
    document.getElementById('wx-out').innerHTML = `
      <div class="wx-loc">
        <i class="ti ti-map-pin" style="font-size:13px" aria-hidden="true"></i>
        ${city}${country ? ', ' + country : ''}
        ${note ? `<span style="opacity:.6">(${note})</span>` : ''}
      </div>
      <div class="wx-header">
        <i class="ti ${WX_ICONS[code]||'ti-cloud'} wx-icon" aria-hidden="true"></i>
        <div>
          <div class="wx-temp">${Math.round(c.temperature_2m)}°C</div>
          <div class="wx-desc">${WX_DESC[code]||'Unknown'}</div>
        </div>
      </div>
      <div class="wx-grid">
        <div class="wx-stat"><div class="wx-key">Feels like</div><div class="wx-val">${Math.round(c.apparent_temperature)}°C</div></div>
        <div class="wx-stat"><div class="wx-key">Humidity</div><div class="wx-val">${Math.round(c.relative_humidity_2m)}%</div></div>
        <div class="wx-stat"><div class="wx-key">Wind</div><div class="wx-val">${Math.round(c.wind_speed_10m)} km/h</div></div>
      </div>`;
  }).catch(() => {
    document.getElementById('wx-out').innerHTML = `<div class="err-msg"><i class="ti ti-alert-circle"></i> Could not load weather.</div>`;
  });
}

async function loadWeatherByIP() {
  try {
    const r = await fetch('https://ipapi.co/json/');
    const d = await r.json();
    renderWeather(d.city||'Unknown', d.country_name||'', d.latitude, d.longitude, 'approximate');
  } catch {
    document.getElementById('wx-out').innerHTML = `<div class="err-msg"><i class="ti ti-alert-circle"></i> Weather unavailable.</div>`;
  }
}

async function loadWeather() {
  if (!navigator.geolocation) { loadWeatherByIP(); return; }
  navigator.geolocation.getCurrentPosition(
    async pos => {
      const { latitude: lat, longitude: lon } = pos.coords;
      try {
        const r = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json`);
        const d = await r.json();
        renderWeather(d.address?.city||d.address?.town||d.address?.village||'Your location', d.address?.country||'', lat, lon, '');
      } catch { renderWeather('Your location','',lat,lon,''); }
    },
    () => loadWeatherByIP(),
    { timeout: 7000 }
  );
}

// ── FLIGHTS ───────────────────────────────────────────────────────────────────
const FLIGHTS = [
  {code:'LHR→AMS',from:'London',    to:'Amsterdam',  airline:'easyJet',   dep:'07:15',arr:'09:40',dur:'1h 25m',price:49,  cur:'GBP',status:'On time'},
  {code:'CDG→BCN',from:'Paris',     to:'Barcelona',  airline:'Vueling',   dep:'08:00',arr:'09:55',dur:'1h 55m',price:62,  cur:'EUR',status:'On time'},
  {code:'BER→WAW',from:'Berlin',    to:'Warsaw',     airline:'LOT',       dep:'10:30',arr:'11:50',dur:'1h 20m',price:55,  cur:'EUR',status:'Delayed 15m'},
  {code:'MAD→LIS',from:'Madrid',    to:'Lisbon',     airline:'Iberia',    dep:'13:00',arr:'14:05',dur:'1h 05m',price:38,  cur:'EUR',status:'On time'},
  {code:'FCO→ATH',from:'Rome',      to:'Athens',     airline:'Ryanair',   dep:'14:20',arr:'17:00',dur:'2h 40m',price:74,  cur:'EUR',status:'On time'},
  {code:'AMS→CPH',from:'Amsterdam', to:'Copenhagen', airline:'KLM',       dep:'11:45',arr:'13:15',dur:'1h 30m',price:88,  cur:'EUR',status:'Boarding'},
  {code:'VIE→PRG',from:'Vienna',    to:'Prague',     airline:'Austrian',  dep:'16:00',arr:'17:05',dur:'1h 05m',price:44,  cur:'EUR',status:'On time'},
  {code:'ARN→HEL',from:'Stockholm', to:'Helsinki',   airline:'Finnair',   dep:'09:00',arr:'10:15',dur:'1h 15m',price:67,  cur:'EUR',status:'On time'},
  {code:'BRU→ZRH',from:'Brussels',  to:'Zurich',     airline:'Swiss',     dep:'12:30',arr:'14:10',dur:'1h 40m',price:91,  cur:'EUR',status:'Delayed 5m'},
  {code:'LIS→SVQ',from:'Lisbon',    to:'Seville',    airline:'TAP',       dep:'15:45',arr:'17:10',dur:'1h 25m',price:29,  cur:'EUR',status:'On time'},
  {code:'WAW→BUD',from:'Warsaw',    to:'Budapest',   airline:'Wizz Air',  dep:'06:50',arr:'07:55',dur:'1h 05m',price:21,  cur:'EUR',status:'On time'},
  {code:'OSL→CPH',from:'Oslo',      to:'Copenhagen', airline:'SAS',       dep:'08:30',arr:'09:40',dur:'1h 10m',price:645, cur:'NOK',status:'On time'},
  {code:'MXP→OPO',from:'Milan',     to:'Porto',      airline:'Ryanair',   dep:'10:00',arr:'12:30',dur:'2h 30m',price:35,  cur:'EUR',status:'On time'},
  {code:'DUB→AMS',from:'Dublin',    to:'Amsterdam',  airline:'Aer Lingus',dep:'07:40',arr:'10:20',dur:'1h 40m',price:57,  cur:'EUR',status:'On time'},
];

function statusChip(s) {
  if (s==='On time')  return `<span class="chip chip-green"><i class="ti ti-check" style="font-size:11px"></i>${s}</span>`;
  if (s==='Boarding') return `<span class="chip chip-blue"><i class="ti ti-plane-departure" style="font-size:11px"></i>${s}</span>`;
  return `<span class="chip chip-amber"><i class="ti ti-clock" style="font-size:11px"></i>${s}</span>`;
}

function loadFlights() {
  const today = new Date().toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
  document.getElementById('fl-out').innerHTML =
    `<div class="info-note"><i class="ti ti-info-circle" style="font-size:13px"></i>Representative routes · ${today} · all under 1,000 local currency</div>` +
    FLIGHTS.map(f => `

// Country code → emoji flag
function flag(code) {
  if (!code) return '';
  const cc = code.toUpperCase();
  const map = {
    USA:'🇺🇸',CAN:'🇨🇦',MEX:'🇲🇽',BRA:'🇧🇷',ARG:'🇦🇷',FRA:'🇫🇷',GER:'🇩🇪',ENG:'🏴󠁧󠁢󠁥󠁮󠁧󠁿',
    ESP:'🇪🇸',POR:'🇵🇹',NED:'🇳🇱',BEL:'🇧🇪',ITA:'🇮🇹',URU:'🇺🇾',COL:'🇨🇴',CHI:'🇨🇱',
    KOR:'🇰🇷',JPN:'🇯🇵',AUS:'🇦🇺',NZL:'🇳🇿',MAR:'🇲🇦',SEN:'🇸🇳',NGA:'🇳🇬',GHA:'🇬🇭',
    CMR:'🇨🇲',TUN:'🇹🇳',EGY:'🇪🇬',DZA:'🇩🇿',KSA:'🇸🇦',IRN:'🇮🇷',IRQ:'🇮🇶',JOR:'🇯🇴',
    QAT:'🇶🇦',SCO:'🏴󠁧󠁢󠁳󠁣󠁴󠁿',TUR:'🇹🇷',PAR:'🇵🇾',ECU:'🇪🇨',CUW:'🇨🇼',HTI:'🇭🇹',SWE:'🇸🇪',
    CIV:'🇨🇮',NOR:'🇳🇴',AUT:'🇦🇹',CPV:'🇨🇻',UZB:'🇺🇿',
  };
  if (map[cc]) return map[cc];
  // Generic flag from regional indicator symbols
  try {
    return String.fromCodePoint(...cc.split('').map(c => 0x1F1E6 - 65 + c.charCodeAt(0)));
  } catch { return '🏳'; }
}

}

function mapUrl(lat, lon, venue) {
  return `https://www.openstreetmap.org/export/embed.html?bbox=${(lon-.015).toFixed(4)},${(lat-.01).toFixed(4)},${(lon+.015).toFixed(4)},${(lat+.01).toFixed(4)}&layer=mapnik&marker=${lat},${lon}`;
}

// Group matches by date
function groupByDate(matches) {
  const groups = {};
  matches.forEach(m => {
    const d = new Date(m.start_time);
    const key = d.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
    if (!groups[key]) groups[key] = [];
    groups[key].push(m);
  });
  return groups;
}

function renderFifa(matches) {
  const out = document.getElementById('fifa-out');
  const upcoming = matches.filter(m => m.status === 'scheduled').slice(0, 14);

  if (!upcoming.length) {
    out.innerHTML = `<p style="font-size:13px;color:var(--text-tertiary);padding:1rem 0;text-align:center">No upcoming fixtures available right now.</p>`;
    return;
  }

  const grouped = groupByDate(upcoming);
  let html = '';

  Object.entries(grouped).forEach(([dateLabel, dayMatches]) => {
    html += `<div class="fifa-date-label">${dateLabel}</div>`;
    dayMatches.forEach((m, idx) => {
      const home = m.home;
      const away = m.away;
      const homeFlag = flag(home);
      const awayFlag = flag(away);
      const homeName = m.teams[home]?.name || home;
      const awayName = m.teams[away]?.name || away;
      const kickoff  = new Date(m.start_time).toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',timeZoneName:'short'});
      const prob = m.win_probability;
      const v = getVenue(home);
      const showMap = idx === 0; // show map only for first match per day group to save space

      let probHtml = '';
      if (prob) {
        const pH = Math.round(prob[home]||0);
        const pD = Math.round(prob.draw||0);
        const pA = Math.round(prob[away]||0);
        probHtml = `<div class="fifa-prob">
          <span class="prob-label">${pH}%</span>
          <div class="prob-bar">
            <div class="prob-home" style="width:${pH}%"></div>
            <div class="prob-draw" style="width:${pD}%"></div>
            <div class="prob-away" style="width:${pA}%"></div>
          </div>
          <span class="prob-label">${pA}%</span>
        </div>`;
      }

      html += `<div class="fifa-match">
        <div class="fifa-teams">
          <div class="fifa-team home">
            <span class="fifa-flag">${homeFlag}</span>
            <span>${homeName}</span>
          </div>
          <div class="fifa-vs">vs</div>
          <div class="fifa-team away">
            <span class="fifa-flag">${awayFlag}</span>
            <span>${awayName}</span>
          </div>
        </div>
        <div class="fifa-meta">
          <span class="fifa-kickoff">
            <i class="ti ti-clock" style="font-size:11px" aria-hidden="true"></i>
            ${kickoff}
          </span>
          <span class="fifa-venue">
            <i class="ti ti-map-pin" style="font-size:11px" aria-hidden="true"></i>
            ${v.venue}, ${v.city}
          </span>
          ${probHtml}
        </div>
        ${showMap ? `<div class="venue-map">
          <iframe
            src="${mapUrl(v.lat, v.lon, v.venue)}"
            title="Map of ${v.venue}"
            loading="lazy"
            referrerpolicy="no-referrer"
          ></iframe>
          <div class="venue-map-label"><i class="ti ti-map" style="font-size:10px"></i> ${v.venue}</div>
        </div>` : ''}
      </div>`;
    });
  });

  out.innerHTML = html;
}
