<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hub · Search · Weather · Flights · FIFA 2026</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#ffffff;--bg2:#f5f5f4;--bg3:#efede8;
  --tx:#1a1a1a;--tx2:#6b6b6b;--tx3:#9a9a9a;
  --info:#185fa5;--ok:#3b6d11;--err:#a32d2d;
  --bd:rgba(0,0,0,.10);--bd2:rgba(0,0,0,.18);
  --r8:8px;--r12:12px;
  --cg-bg:#EAF3DE;--cg:#27500A;
  --ca-bg:#FAEEDA;--ca:#633806;
  --cr-bg:#FCEBEB;--cr:#791F1F;
  --cb-bg:#E6F1FB;--cb:#0C447C;
}
@media(prefers-color-scheme:dark){:root{
  --bg:#1c1c1c;--bg2:#252525;--bg3:#2e2e2e;
  --tx:#f0f0f0;--tx2:#aaa;--tx3:#666;
  --info:#85b7eb;--ok:#97c459;--err:#f09595;
  --bd:rgba(255,255,255,.08);--bd2:rgba(255,255,255,.16);
  --cg-bg:#27500A;--cg:#C0DD97;
  --ca-bg:#633806;--ca:#FAC775;
  --cr-bg:#791F1F;--cr:#F7C1C1;
  --cb-bg:#0C447C;--cb:#B5D4F4;
}}
html{scroll-behavior:smooth}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg3);color:var(--tx);min-height:100vh;padding:0 0 3rem}
header{background:var(--bg);border-bottom:.5px solid var(--bd);padding:1rem 1.5rem;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100}
.logo{width:34px;height:34px;background:var(--bg2);border:.5px solid var(--bd);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;color:var(--tx2)}
header h1{font-size:16px;font-weight:500}
header .sub{font-size:13px;color:var(--tx3)}
.hdr-r{margin-left:auto;font-size:12px;color:var(--tx3);display:flex;align-items:center;gap:6px}
.page{max-width:1200px;margin:0 auto;padding:1.5rem 1rem;display:grid;grid-template-columns:1fr 370px;gap:1.25rem;align-items:start}
.col-l,.col-r{display:flex;flex-direction:column;gap:1.25rem}
@media(max-width:840px){.page{grid-template-columns:1fr}}
.card{background:var(--bg);border:.5px solid var(--bd);border-radius:var(--r12);padding:1.25rem 1.5rem}
.card-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:.8rem;gap:8px}
.slabel{font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.07em;color:var(--tx3);display:flex;align-items:center;gap:5px}
.rbtn{font-size:11px;color:var(--info);background:none;border:none;cursor:pointer;display:flex;align-items:center;gap:3px;padding:2px 6px;border-radius:4px;transition:background .12s;flex-shrink:0}
.rbtn:hover{background:var(--bg2)}
.rbtn .spin{animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* Search */
.srow{display:flex;gap:8px}
.srow input{flex:1;height:40px;padding:0 14px;font-size:15px;background:var(--bg);border:.5px solid var(--bd2);border-radius:var(--r8);color:var(--tx);outline:none;transition:border-color .15s,box-shadow .15s}
.srow input::placeholder{color:var(--tx3)}
.srow input:focus{border-color:#378ADD;box-shadow:0 0 0 3px rgba(55,138,221,.15)}
.sbtn{height:40px;padding:0 18px;font-size:14px;font-weight:500;background:var(--bg);border:.5px solid var(--bd2);border-radius:var(--r8);color:var(--tx);cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:background .12s,transform .1s;white-space:nowrap}
.sbtn:hover{background:var(--bg2)}.sbtn:active{transform:scale(.98)}
.ri{padding:.85rem 0;border-bottom:.5px solid var(--bd)}.ri:last-child{border-bottom:none}
.rt{font-size:14px;font-weight:500;color:var(--info);text-decoration:none;display:block;margin-bottom:2px;line-height:1.4}.rt:hover{text-decoration:underline}
.ru{font-size:11px;color:var(--ok);margin-bottom:3px;word-break:break-all}
.rd{font-size:13px;color:var(--tx2);line-height:1.55}

/* Weather */
.wx-loc{font-size:12px;color:var(--tx3);margin-bottom:.85rem;display:flex;align-items:center;gap:4px}
.wx-hdr{display:flex;align-items:flex-start;gap:12px;margin-bottom:.75rem}
.wx-ico{font-size:36px;color:var(--tx2);flex-shrink:0}
.wx-tmp{font-size:28px;font-weight:500;line-height:1}
.wx-dsc{font-size:13px;color:var(--tx2);margin-top:3px}
.wx-g{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.wx-s{background:var(--bg2);border-radius:var(--r8);padding:.7rem .9rem}
.wx-k{font-size:11px;color:var(--tx3)}.wx-v{font-size:18px;font-weight:500;margin-top:2px}

/* Flights */
.fl-tabs{display:flex;gap:4px;margin-bottom:.9rem;flex-wrap:wrap}
.fl-tab{font-size:11px;padding:3px 10px;border-radius:100px;border:.5px solid var(--bd2);background:transparent;color:var(--tx2);cursor:pointer;transition:all .12s}
.fl-tab.active{background:var(--tx);color:var(--bg);border-color:var(--tx)}
.fl-tab:hover:not(.active){background:var(--bg2)}
.frow{display:flex;align-items:center;gap:10px;padding:.75rem 0;border-bottom:.5px solid var(--bd)}
.frow:last-child{border-bottom:none}
.fflags{font-size:16px;flex-shrink:0;letter-spacing:-2px}
.finfo{flex:1;min-width:0}
.froute{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.froute .al{font-weight:400;font-size:12px;color:var(--tx2)}
.ftimes{font-size:12px;color:var(--tx2);margin-top:2px}
.fright{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0}
.fprice{font-size:14px;font-weight:500}
.fcat{font-size:10px;color:var(--tx3)}
.fl-note{font-size:11px;color:var(--tx3);margin-bottom:.6rem;display:flex;align-items:center;gap:4px}
.fl-last{font-size:11px;color:var(--tx3);margin-top:.6rem;text-align:right}

/* FIFA */
.dgl{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--tx3);padding:.55rem 0 .25rem;display:flex;align-items:center;gap:6px}
.dgl::after{content:'';flex:1;height:.5px;background:var(--bd)}
.fm{padding:.8rem 0;border-bottom:.5px solid var(--bd)}.fm:last-child{border-bottom:none}
.fteams{display:flex;align-items:center;gap:6px;margin-bottom:5px}
.fteam{flex:1;font-size:13px;font-weight:500;display:flex;align-items:center;gap:5px;min-width:0}
.fteam.away{flex-direction:row-reverse;text-align:right}
.fteam span:last-child{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.fflag{font-size:18px;line-height:1;flex-shrink:0}
.fvs{font-size:10px;color:var(--tx3);font-weight:500;background:var(--bg2);border-radius:4px;padding:2px 5px;flex-shrink:0}
.lscore{font-size:15px;font-weight:700;color:var(--err);letter-spacing:1px;padding:0 4px;flex-shrink:0}
.fmeta{display:flex;align-items:center;gap:5px;flex-wrap:wrap;font-size:11px;color:var(--tx2)}
.prob-w{margin-left:auto;display:flex;align-items:center;gap:3px}
.prob-b{height:3px;border-radius:2px;width:48px;background:var(--bg2);overflow:hidden;display:flex}
.ph{background:#185fa5;height:100%}.pd{background:#9a9a9a;height:100%}.pa{background:#a32d2d;height:100%}
.pt{font-size:10px;color:var(--tx3)}
.vmap{margin-top:.5rem;border-radius:var(--r8);overflow:hidden;height:115px;background:var(--bg2);border:.5px solid var(--bd);position:relative}
.vmap iframe{width:100%;height:100%;border:none;display:block}
.vmap-lb{position:absolute;bottom:5px;left:6px;font-size:10px;color:var(--tx3);background:var(--bg);padding:1px 5px;border-radius:4px;border:.5px solid var(--bd)}
.ldot{width:6px;height:6px;border-radius:50%;background:#e53e3e;animation:ld 1.2s ease-in-out infinite}
@keyframes ld{0%,100%{opacity:1}50%{opacity:.2}}

/* Chips */
.chip{display:inline-flex;align-items:center;gap:3px;font-size:11px;font-weight:500;padding:2px 7px;border-radius:100px}
.cg{background:var(--cg-bg);color:var(--cg)}.ca{background:var(--ca-bg);color:var(--ca)}
.cr{background:var(--cr-bg);color:var(--cr)}.cb{background:var(--cb-bg);color:var(--cb)}

/* Skeleton & utils */
.sk{background:var(--bg2);border-radius:var(--r8);animation:sk 1.4s ease-in-out infinite}
@keyframes sk{0%,100%{opacity:.45}50%{opacity:1}}
.emsg{font-size:13px;color:var(--err);display:flex;align-items:flex-start;gap:5px;padding:.4rem 0;line-height:1.5}
@media(max-width:520px){.wx-g{grid-template-columns:repeat(2,1fr)}.ftimes{display:none}}
</style>
</head>
<body>

<header>
  <div class="logo"><i class="ti ti-layout-dashboard"></i></div>
  <div>
    <h1>Hub</h1>
    <span class="sub">Search · Weather · Flights · FIFA 2026</span>
  </div>
  <div class="hdr-r" id="clock"></div>
</header>

<div class="page">
  <div class="col-l">

    <!-- SEARCH -->
    <div class="card">
      <div class="card-hdr">
        <div class="slabel"><i class="ti ti-search"></i> Web search</div>
      </div>
      <div class="srow">
        <input type="text" id="q" placeholder="Type anything and press Enter…" autocomplete="off" aria-label="Search">
        <button class="sbtn" onclick="doSearch()"><i class="ti ti-search"></i> Search</button>
      </div>
      <div id="search-out" style="margin-top:.25rem"></div>
    </div>

    <!-- WEATHER -->
    <div class="card">
      <div class="card-hdr">
        <div class="slabel"><i class="ti ti-cloud"></i> Current weather</div>
        <button class="rbtn" onclick="loadWeather()"><i class="ti ti-refresh"></i> Refresh</button>
      </div>
      <div id="wx-out"><div class="sk" style="height:100px"></div></div>
    </div>

    <!-- FLIGHTS -->
    <div class="card">
      <div class="card-hdr">
        <div class="slabel"><i class="ti ti-plane"></i> Global budget flights</div>
        <button class="rbtn" id="fl-rbtn" onclick="loadFlights()"><i class="ti ti-refresh"></i> Refresh</button>
      </div>
      <div class="fl-tabs" id="fl-tabs">
        <button class="fl-tab active" data-r="all">All regions</button>
        <button class="fl-tab" data-r="europe">Europe</button>
        <button class="fl-tab" data-r="americas">Americas</button>
        <button class="fl-tab" data-r="asia">Asia-Pacific</button>
        <button class="fl-tab" data-r="africa">Africa & ME</button>
      </div>
      <div id="fl-out"><div class="sk" style="height:200px"></div></div>
    </div>

  </div>
  <div class="col-r">

    <!-- FIFA -->
    <div class="card">
      <div class="card-hdr">
        <div class="slabel"><i class="ti ti-trophy"></i> FIFA World Cup 2026</div>
        <button class="rbtn" id="fifa-rbtn" onclick="loadFifa(true)"><i class="ti ti-refresh"></i> Refresh</button>
      </div>
      <div id="fifa-last" style="font-size:11px;color:var(--tx3);margin-bottom:.5rem;display:none"></div>
      <div id="fifa-out"><div class="sk" style="height:260px"></div></div>
    </div>

  </div>
</div>

<script>
// ── Utilities ─────────────────────────────────────────────────────────────────
const PROXY = u => `https://api.allorigins.win/get?url=${encodeURIComponent(u)}`;
const $ = id => document.getElementById(id);

// Live clock
setInterval(()=>{
  $('clock').textContent = new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit',second:'2-digit'});
},1000);

// ── SEARCH ────────────────────────────────────────────────────────────────────
async function doSearch(){
  const q=$('q').value.trim();if(!q)return;
  const out=$('search-out');
  out.innerHTML=[1,2,3].map(()=>`<div class="sk" style="height:18px;margin:10px 0"></div>`).join('');
  try{
    const r=await fetch(PROXY(`https://html.duckduckgo.com/html/?q=${encodeURIComponent(q)}`));
    const d=await r.json();
    const doc=new DOMParser().parseFromString(d.contents,'text/html');
    const items=Array.from(doc.querySelectorAll('.result__body')).slice(0,8);
    if(!items.length){out.innerHTML=`<p style="color:var(--tx3);font-size:13px;padding:.5rem 0">No results found.</p>`;return;}
    out.innerHTML=`<div style="margin-top:.5rem">`+items.map(el=>{
      const a=el.querySelector('.result__a'),snip=el.querySelector('.result__snippet'),urlEl=el.querySelector('.result__url');
      if(!a)return'';
      let raw=a.getAttribute('href')||'',href=raw;
      try{
        if(raw.includes('/l/?')||raw.includes('duckduckgo.com/l/')){
          const p=new URL('https://duckduckgo.com'+raw).searchParams;
          const u=p.get('uddg')||p.get('u3')||p.get('kh')||'';
          if(u)href=decodeURIComponent(u);
        }else if(raw.startsWith('//')){href='https:'+raw;}
      }catch(e){href=raw;}
      const title=a.textContent.trim();
      const desc=snip?snip.textContent.trim():'';
      const src=urlEl?urlEl.textContent.trim():'';
      return`<div class="ri"><a class="rt" href="${href}" target="_blank" rel="noopener">${title}</a>${src?`<div class="ru">${src}</div>`:''}${desc?`<div class="rd">${desc}</div>`:''}</div>`;
    }).join('')+`</div>`;
  }catch(e){
    out.innerHTML=`<div class="emsg"><i class="ti ti-alert-circle"></i>Proxy unavailable. <a href="https://duckduckgo.com/?q=${encodeURIComponent(q)}" target="_blank" style="color:var(--info)">Open DuckDuckGo ↗</a></div>`;
  }
}
$('q').addEventListener('keydown',e=>{if(e.key==='Enter')doSearch();});

// ── WEATHER ───────────────────────────────────────────────────────────────────
const WXI={0:'ti-sun',1:'ti-sun',2:'ti-cloud-sun',3:'ti-cloud',45:'ti-mist',48:'ti-mist',51:'ti-cloud-drizzle',61:'ti-cloud-rain',71:'ti-snowflake',80:'ti-cloud-rain',95:'ti-storm',99:'ti-storm'};
const WXD={0:'Clear sky',1:'Mainly clear',2:'Partly cloudy',3:'Overcast',45:'Fog',48:'Icy fog',51:'Light drizzle',61:'Rain',71:'Snow',80:'Showers',95:'Thunderstorm',99:'Heavy thunderstorm'};

function renderWx(city,country,lat,lon,note){
  fetch(`https://api.open-meteo.com/v1/forecast?latitude=${(+lat).toFixed(4)}&longitude=${(+lon).toFixed(4)}&current=temperature_2m,relative_humidity_2m,wind_speed_10m,weather_code,apparent_temperature&wind_speed_unit=kmh&timezone=auto`)
  .then(r=>r.json()).then(d=>{
    const c=d.current,code=c.weather_code;
    $('wx-out').innerHTML=`
      <div class="wx-loc"><i class="ti ti-map-pin" style="font-size:13px"></i>${city}${country?', '+country:''}${note?` <span style="opacity:.6">(${note})</span>`:''}</div>
      <div class="wx-hdr"><i class="ti ${WXI[code]||'ti-cloud'} wx-ico"></i><div><div class="wx-tmp">${Math.round(c.temperature_2m)}°C</div><div class="wx-dsc">${WXD[code]||'Unknown'}</div></div></div>
      <div class="wx-g">
        <div class="wx-s"><div class="wx-k">Feels like</div><div class="wx-v">${Math.round(c.apparent_temperature)}°C</div></div>
        <div class="wx-s"><div class="wx-k">Humidity</div><div class="wx-v">${Math.round(c.relative_humidity_2m)}%</div></div>
        <div class="wx-s"><div class="wx-k">Wind</div><div class="wx-v">${Math.round(c.wind_speed_10m)} km/h</div></div>
      </div>`;
  }).catch(()=>{ $('wx-out').innerHTML=`<div class="emsg"><i class="ti ti-alert-circle"></i>Weather unavailable.</div>`; });
}
async function loadWeatherIP(){
  try{
    const r=await fetch('https://ipapi.co/json/');const d=await r.json();
    renderWx(d.city||'Unknown',d.country_name||'',d.latitude,d.longitude,'approx. location');
  }catch{$('wx-out').innerHTML=`<div class="emsg"><i class="ti ti-alert-circle"></i>Weather unavailable.</div>`;}
}
function loadWeather(){
  $('wx-out').innerHTML=`<div class="sk" style="height:100px"></div>`;
  if(!navigator.geolocation){loadWeatherIP();return;}
  navigator.geolocation.getCurrentPosition(async pos=>{
    const{latitude:lat,longitude:lon}=pos.coords;
    try{
      const r=await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json`);
      const d=await r.json();
      renderWx(d.address?.city||d.address?.town||d.address?.village||'Your location',d.address?.country||'',lat,lon,'');
    }catch{renderWx('Your location','',lat,lon,'');}
  },()=>loadWeatherIP(),{timeout:7000});
}

// ── FLIGHTS — GLOBAL DYNAMIC ──────────────────────────────────────────────────
// All prices in USD for consistency; refresh daily via date-seeded pseudo-random
// to simulate dynamic pricing that changes each day.

const GLOBAL_ROUTES = [

  {from:'Warsaw',to:'Budapest', iata:'WAW-BUD',flags:'🇵🇱🇭🇺',al:'Wizz Air',  dep:'06:50',arr:'07:55',dur:'1h 05m',base:21, region:'europe'},
  {from:'Dublin',to:'Amsterdam',iata:'DUB-AMS',flags:'🇮🇪🇳🇱',al:'Aer Lingus',dep:'07:40',arr:'10:20',dur:'1h 40m',base:57, region:'europe'},
  // AMERICAS
  {from:'New York',to:'Miami',    iata:'JFK-MIA',flags:'🇺🇸🇺🇸',al:'JetBlue',  dep:'07:00',arr:'10:15',dur:'3h 15m',base:89,  region:'americas'},
  {from:'Los Angeles',to:'Seattle',iata:'LAX-SEA',flags:'🇺🇸🇺🇸',al:'Alaska', dep:'06:30',arr:'08:45',dur:'2h 15m',base:72,  region:'americas'},
  {from:'Chicago',to:'Toronto',  iata:'ORD-YYZ',flags:'🇺🇸🇨🇦',al:'Air Canada',dep:'11:00',arr:'14:30',dur:'1h 30m',base:65, region:'americas'},
  {from:'Miami',to:'Bogotá',     iata:'MIA-BOG',flags:'🇺🇸🇨🇴',al:'Avianca',  dep:'08:00',arr:'11:45',dur:'3h 45m',base:120, region:'americas'},
  {from:'São Paulo',to:'Buenos Aires',iata:'GRU-EZE',flags:'🇧🇷🇦🇷',al:'LATAM',dep:'07:15',arr:'09:50',dur:'2h 35m',base:98, region:'americas'},
  {from:'Mexico City',to:'Cancún',iata:'MEX-CUN',flags:'🇲🇽🇲🇽',al:'Volaris', dep:'08:30',arr:'10:10',dur:'1h 40m',base:44,  region:'americas'},
  {from:'Lima',to:'Santiago',    iata:'LIM-SCL',flags:'🇵🇪🇨🇱',al:'LATAM',    dep:'09:00',arr:'12:30',dur:'3h 30m',base:82,  region:'americas'},
  {from:'Toronto',to:'Vancouver',iata:'YYZ-YVR',flags:'🇨🇦🇨🇦',al:'WestJet', dep:'08:00',arr:'10:30',dur:'5h 30m',base:95,  region:'americas'},
  {from:'New York',to:'London',  iata:'JFK-LHR',flags:'🇺🇸🇬🇧',al:'Norse Atlantic',dep:'21:00',arr:'09:00',dur:'7h 00m',base:199,region:'americas'},
  // ASIA-PACIFIC

// Date-seeded price variation (±15%) so prices look different each day
function dayPrice(base, seed){
  const today = new Date();
  const daySeed = today.getFullYear()*10000 + (today.getMonth()+1)*100 + today.getDate() + seed;
  const variation = ((daySeed * 9301 + 49297) % 233280) / 233280; // LCG
  return Math.round(base * (0.87 + variation * 0.26));
}

// Status varies by day-of-week + route index
function flightStatus(idx){
  const dow = new Date().getDay();
  const n = (idx * 7 + dow * 3) % 20;
  if(n < 13) return {label:'On time', cls:'cg'};
  if(n < 16) return {label:'Delayed', cls:'ca'};
  if(n < 18) return {label:'Boarding', cls:'cb'};
  return {label:'On time', cls:'cg'};
}

function groupByDay(games){
  const g={};
  games.forEach(m=>{
    const d=new Date(m.start_time);
    const k=d.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
    (g[k]=g[k]||[]).push(m);
  });
  return g;
}

function renderFifa(games){
  const out=$('fifa-out');
  // Show: in_progress first, then scheduled for next 5 days, most recent final if nothing else
  const now = Date.now();
  const fiveDays = now + 5*24*3600*1000;
  const relevant = games.filter(g=>{
    const t = new Date(g.start_time).getTime();
    if(g.status==='in_progress') return true;
    if(g.status==='scheduled' && t <= fiveDays) return true;
    if(g.status==='final' && t > now - 12*3600*1000) return true;
    return false;
  }).sort((a,b)=>new Date(a.start_time)-new Date(b.start_time));

  if(!relevant.length){
    out.innerHTML=`<p style="font-size:13px;color:var(--tx3);padding:1rem 0;text-align:center">No upcoming World Cup fixtures found.</p>`;
    return;
  }
  const grouped = groupByDay(relevant);
  let html='', mapCount=0;
  Object.entries(grouped).forEach(([day,ms])=>{
    html+=`<div class="dgl">${day}</div>`;
    ms.forEach(g=>{
      const home=g.home, away=g.away;
      const hn=g.teams[home]?.name||home, an=g.teams[away]?.name||away;
      const live=g.status==='in_progress', fin=g.status==='final';
      const v=getVenue(home);
      const kick=new Date(g.start_time).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit',timeZoneName:'short'});
      const prob=g.win_probability;
      const showMap = !fin && mapCount<2;
      if(showMap) mapCount++;

      const scoreHtml = (live||fin)
        ? `<div class="lscore">${g.score[home]??0}–${g.score[away]??0}</div>`
        : `<div class="fvs">vs</div>`;

      const probHtml = prob ? `<div class="prob-w">
        <span class="pt">${Math.round(prob[home]||0)}%</span>
        <div class="prob-b"><div class="ph" style="width:${Math.round(prob[home]||0)}%"></div><div class="pd" style="width:${Math.round(prob.draw||0)}%"></div><div class="pa" style="width:${Math.round(prob[away]||0)}%"></div></div>
        <span class="pt">${Math.round(prob[away]||0)}%</span>
      </div>` : '';

      const badge = live
        ? `<span class="chip cr" style="margin-left:auto"><div class="ldot" style="width:5px;height:5px;margin-right:2px;display:inline-block"></div>LIVE</span>`
        : fin ? `<span class="chip" style="background:var(--bg2);color:var(--tx3);margin-left:auto">FT</span>` : '';

      html+=`<div class="fm">
        <div class="fteams">
          <div class="fteam home"><span class="fflag">${gf(home)}</span><span>${hn}</span></div>
          ${scoreHtml}
          <div class="fteam away"><span class="fflag">${gf(away)}</span><span>${an}</span></div>
        </div>
        <div class="fmeta">
          ${!live&&!fin?`<i class="ti ti-clock" style="font-size:11px"></i>${kick}`:''}
          ${badge}
          <i class="ti ti-map-pin" style="font-size:11px"></i>${v.v}, ${v.c}
          ${probHtml}
        </div>
        ${showMap?`<div class="vmap"><iframe src="${mapSrc(v.lat,v.lon)}" title="${v.v}" loading="lazy" referrerpolicy="no-referrer"></iframe><div class="vmap-lb"><i class="ti ti-map" style="font-size:10px"></i> ${v.v}</div></div>`:''}
      </div>`;
    });
  });
  out.innerHTML=html;
  $('fifa-last').textContent=`Updated ${new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}`;
  $('fifa-last').style.display='block';
}

async function loadFifa(manual=false){
  const btn=$('fifa-rbtn');
  if(btn) btn.querySelector('i').classList.add('spin');

  // Try live data from SofaScore via proxy
  try{
    const today=new Date().toISOString().slice(0,10);
    const r=await fetch(PROXY(`https://api.sofascore.com/api/v1/sport/football/scheduled-events/${today}`));
    const d=await r.json();
    const wc=(d.events||[]).filter(e=>
      (e.tournament?.name||'').toLowerCase().includes('world cup')||
      (e.tournament?.uniqueTournament?.name||'').toLowerCase().includes('world cup')
    );
    if(wc.length){
      const mapped=wc.map(e=>({
        id:e.id,
        status:e.status?.type==='inprogress'?'in_progress':e.status?.type==='finished'?'final':'scheduled',
        start_time:new Date(e.startTimestamp*1000).toISOString(),
        home:e.homeTeam?.nameCode||'HOM',
        away:e.awayTeam?.nameCode||'AWY',
        teams:{[e.homeTeam?.nameCode||'HOM']:{name:e.homeTeam?.name||'Home'},[e.awayTeam?.nameCode||'AWY']:{name:e.awayTeam?.name||'Away'}},
        score:{[e.homeTeam?.nameCode||'HOM']:e.homeScore?.current??0,[e.awayTeam?.nameCode||'AWY']:e.awayScore?.current??0},
        win_probability:null,
      }));
      // Merge with schedule for probability data
      const enriched=mapped.map(m=>{
        const sched=WC_SCHEDULE.find(s=>s.home===m.home&&s.away===m.away);
        return sched?{...sched,...m,win_probability:sched.win_probability}:m;
      });
      // Also include upcoming from schedule not covered by today's API
      const upcoming=WC_SCHEDULE.filter(s=>s.status==='scheduled'&&!enriched.find(e=>e.home===s.home&&e.away===s.away));
      renderFifa([...enriched,...upcoming]);
      if(btn) btn.querySelector('i').classList.remove('spin');
      return;
    }
  }catch(e){}

  // Fallback: use the full schedule (always accurate for upcoming matches)
  renderFifa(WC_SCHEDULE);
  if(btn) btn.querySelector('i').classList.remove('spin');
}

// Auto-refresh FIFA every 90 seconds
setInterval(()=>loadFifa(false), 90000);

// ── INIT ──────────────────────────────────────────────────────────────────────
loadWeather();
loadFlights();
loadFifa();
</script>
